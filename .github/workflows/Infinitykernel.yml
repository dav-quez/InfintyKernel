name: Build InfinityKernel One UI 8 (C2S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout InfinityKernel
        uses: actions/checkout@v4

      - name: Clone RAGNARØK kernel (stable base)
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git ragnarok-kernel
          echo "[+] RAGNARØK kernel cloned (stable)"
          cd ragnarok-kernel
          git log --oneline -3

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libarchive-tools ccache wget git \
            gcc-aarch64-linux-gnu device-tree-compiler \
            libssl-dev libelf-dev bc bison flex openssl

      - name: Prepare source (RAGNARØK stable base)
        run: |
          cd $GITHUB_WORKSPACE
          cp -r /tmp/ragnarok-kernel/* .
          echo "[+] Using RAGNARØK as base"

      - name: Fix KernelSU Kconfig conflicts
        run: |
          cd $GITHUB_WORKSPACE
          
          if [ -f drivers/Kconfig ]; then
            sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig
          fi
          
          if [ -f drivers/Makefile ]; then
            sed -i 's/^obj-y += kernelsu\//# obj-y += kernelsu\//' drivers/Makefile
          fi
          
          echo "[+] KernelSU disabled"

      - name: Configure kernel for C2S
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Use RAGNARØK's c2s config (we know it works)
          if [ -f arch/arm64/configs/c2s_defconfig ]; then
            cp arch/arm64/configs/c2s_defconfig .config
            echo "[+] Using c2s_defconfig"
          else
            echo "[-] c2s_defconfig not found!"
            ls arch/arm64/configs/ | grep c2
            exit 1
          fi
          
          make oldconfig < /dev/null || true
          echo "[+] Kernel configured"

      - name: Compile kernel
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "[*] Compiling kernel..."
          
          # Compilar con jobs limitados para mejor debugging
          if make -j4 Image dtbs 2>&1 | tee build.log; then
            if [ -f arch/arm64/boot/Image ]; then
              echo "[+] ✅ Compilation successful!"
              ls -lh arch/arm64/boot/Image
            else
              echo "[-] Image not found!"
              tail -50 build.log
              exit 1
            fi
          else
            echo "[-] Compilation failed!"
            grep -i "error" build.log | head -20
            exit 1
          fi

      - name: Create flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          
          if [ ! -f arch/arm64/boot/Image ]; then
            echo "[-] Image missing, cannot create ZIP"
            exit 1
          fi
          
          OUTDIR="InfinityKernel-C2S"
          mkdir -p $OUTDIR/META-INF/com/google/android
          cp arch/arm64/boot/Image $OUTDIR/
          
          cat > $OUTDIR/META-INF/com/google/android/updater-script << 'EOF'
          ui_print("InfinityKernel One UI 8 - C2S");
          write_raw_image(package_extract_file("Image"), "boot");
          ui_print("✅ Installation complete!");
          EOF
          
          cd $OUTDIR && zip -r9q ../InfinityKernel-One-UI-8-C2S.zip .
          cd ..
          ls -lh InfinityKernel-One-UI-8-C2S.zip

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: InfinityKernel-C2S
          path: InfinityKernel-One-UI-8-C2S.zip

      - name: Build Complete
        run: |
          echo "✅ InfinityKernel built successfully!"
