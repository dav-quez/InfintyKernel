- name: Self-healing compile (Deep Linker Fix)
        run: |
          cd $GITHUB_WORKSPACE
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          for i in {1..10}; do
            echo "=== Intento de Compilación $i ==="
            make -j$(nproc) Image 2>&1 | tee build.log

            if [ -f arch/arm64/boot/Image ]; then echo "ÉXITO"; exit 0; fi

            # Si falla, buscamos el símbolo perdido
            MISSING_SYM=$(grep "undefined reference to" build.log | head -n 1 | cut -d"'" -f2)
            
            if [ ! -z "$MISSING_SYM" ]; then
              echo "[!] Símbolo perdido detectado: $MISSING_SYM"
              
              # Buscar en qué archivo está definido el símbolo
              REAL_FILE=$(grep -r "$MISSING_SYM" . | grep -v ".o:" | grep ".c:" | cut -d: -f1 | head -n 1)
              
              if [ ! -z "$REAL_FILE" ]; then
                echo "[+] Símbolo encontrado en: $REAL_FILE. Añadiendo al Makefile local..."
                # Convertimos el nombre del archivo .c a .o para el Makefile
                OBJ_NAME=$(basename "${REAL_FILE%.c}.o")
                
                # Inyectar en el Makefile del directorio actual de error
                # Asumimos que el error es en el directorio donde falla el link
                echo "obj-y += $OBJ_NAME" >> drivers/gpu/arm/bv_r38p1/Makefile
                
                # Limpiar para forzar link
                rm -f drivers/gpu/arm/bv_r38p1/*.o
              else
                echo "[!] No se encontró el archivo fuente para $MISSING_SYM. Intentando parchear cabecera..."
                echo "#define $MISSING_SYM(...) (0)" >> include/linux/debug-snapshot.h
              fi
            fi
            
            # Limpieza básica para evitar el "No progress made"
            make clean
          done
