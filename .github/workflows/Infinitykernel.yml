name: Build InfinityKernel (Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Clone RAGNARØK kernel
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git kernel

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential gcc-aarch64-linux-gnu \
            libssl-dev libelf-dev bc bison flex device-tree-compiler zip

      - name: Prepare source
        run: |
          cp -r /tmp/kernel/* $GITHUB_WORKSPACE/
          cd $GITHUB_WORKSPACE
          # Limpiar KernelSU si es necesario
          sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig 2>/dev/null || true
          
          # Crear cabecera de parches (si no existe)
          mkdir -p include/linux
          cat > include/linux/debug-snapshot.h << 'ENDFILE'
          #ifndef __DEBUG_SNAPSHOT_H
          #define __DEBUG_SNAPSHOT_H
          #define exynos_ss_register(...) (0)
          #define exynos_ss_unregister(...) (0)
          #endif
          ENDFILE

      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          cp arch/arm64/configs/c2s.config .config
          
          # Forzar habilitación de opciones de Samsung
          echo "CONFIG_EXYNOS_SS=y" >> .config
          echo "CONFIG_EXYNOS_SNAPSHOT=y" >> .config
          
          make olddefconfig > /dev/null 2>&1 || true

      - name: Build with Self-Healing
        run: |
          cd $GITHUB_WORKSPACE
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Intentos de compilación
          for i in {1..10}; do
            echo "=== Intento $i ==="
            make -j$(nproc) Image 2>&1 | tee build.log
            
            if [ -f arch/arm64/boot/Image ]; then
              echo "[+] ✅ ÉXITO!"
              break
            fi

            # Si falla, detectar símbolo perdido y añadirlo al stub
            if grep -q "undefined reference to" build.log; then
              MISSING_SYM=$(grep "undefined reference to" build.log | head -n 1 | cut -d"'" -f2)
              echo "[!] Símbolo perdido detectado: $MISSING_SYM. Parcheando..."
              
              # Añadir a la cabecera como función vacía
              sed -i "/#endif/i #define $MISSING_SYM(...) (0)" include/linux/debug-snapshot.h
              
              # Limpiar para forzar recompilación
              make clean
            else
              echo "[!] Error no reconocido, abortando."
              exit 1
            fi
          done

          if [ ! -f arch/arm64/boot/Image ]; then
            echo "[-] Error: La compilación falló tras varios intentos."
            exit 1
          fi

      - name: Create flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p out/META-INF/com/google/android
          cp arch/arm64/boot/Image out/
          cat > out/META-INF/com/google/android/updater-script << 'EOF'
          ui_print("InfinityKernel - Fixed Build");
          write_raw_image(package_extract_file("Image"), "boot");
          ui_print("Done!");
          EOF
          cd out && zip -r9 ../InfinityKernel-Fixed.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: InfinityKernel-Fixed
          path: InfinityKernel-Fixed.zip
