name: Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd /tmp && git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git kernel
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential gcc-aarch64-linux-gnu libssl-dev libelf-dev bc bison flex
      - run: cp -r /tmp/kernel/* $GITHUB_WORKSPACE/
      - run: cd $GITHUB_WORKSPACE && sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig 2>/dev/null || true
      - run: |
          cat > $GITHUB_WORKSPACE/include/linux/debug-snapshot.h << 'ENDFILE'
          #ifndef __DEBUG_SNAPSHOT_H
          #define __DEBUG_SNAPSHOT_H
          #define dbg_snapshot_spinlock(...) do {} while (0)
          #define dbg_snapshot_irqs_disabled(...) do {} while (0)
          #define dbg_snapshot_get_hardlockup() (0)
          #define dbg_snapshot_irq(...) do {} while (0)
          #define dbg_snapshot_reg(...) do {} while (0)
          #define dbg_snapshot_irqs(...) do {} while (0)
          #endif
          ENDFILE
      - run: cd $GITHUB_WORKSPACE && export ARCH=arm64 && export CROSS_COMPILE=aarch64-linux-gnu- && cp arch/arm64/configs/c2s.config .config && sed -i '/CONFIG_DEBUG_SNAPSHOT/d' .config && echo "# CONFIG_DEBUG_SNAPSHOT is not set" >> .config && make olddefconfig && make -j4 Image dtbs
      - run: cd $GITHUB_WORKSPACE && mkdir -p out && cp arch/arm64/boot/Image out/ && cd out && zip -r9 ../InfinityKernel-C2S.zip . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: InfinityKernel-C2S.zip
