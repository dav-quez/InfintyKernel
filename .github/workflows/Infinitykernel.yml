name: Build InfinityKernel One UI 8 (C2S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout InfinityKernel
        uses: actions/checkout@v4

      - name: Clone Artisan kernel base
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/Android-Artisan/android_kernel_samsung_exynos990.git artisan-kernel
          echo "[+] Artisan kernel cloned"

      - name: Clone RAGNARØK optimizations
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git ragnarok-kernel
          echo "[+] RAGNARØK kernel cloned"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libarchive-tools ccache wget git \
            gcc-aarch64-linux-gnu device-tree-compiler \
            libssl-dev libelf-dev bc bison flex openssl

      - name: Prepare source (Artisan One UI 8 base)
        run: |
          cd $GITHUB_WORKSPACE
          cp -r /tmp/artisan-kernel/* .
          echo "[+] Using Artisan One UI 8 as base"

      - name: Fix KernelSU Kconfig conflicts
        run: |
          cd $GITHUB_WORKSPACE
          
          echo "[*] Disabling KernelSU to avoid Kconfig conflicts..."
          
          # Comment out KernelSU in drivers/Kconfig
          if [ -f drivers/Kconfig ]; then
            sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig
            grep -n "kernelsu" drivers/Kconfig || echo "[+] KernelSU Kconfig disabled"
          fi
          
          # Comment in drivers/Makefile
          if [ -f drivers/Makefile ]; then
            sed -i 's/^obj-y += kernelsu\//# obj-y += kernelsu\//' drivers/Makefile
            echo "[+] KernelSU Makefile disabled"
          fi

      - name: Copy safe optimizations from RAGNARØK
        run: |
          cd $GITHUB_WORKSPACE
          
          echo "[*] Copying RAGNARØK optimizations..."
          
          # Overclock
          [ -f /tmp/ragnarok-kernel/drivers/cpufreq/exynos-acme.c ] && \
            cp /tmp/ragnarok-kernel/drivers/cpufreq/exynos-acme.* drivers/cpufreq/ 2>/dev/null || echo "[!] exynos-acme not found"
          
          # Thermal
          [ -d /tmp/ragnarok-kernel/drivers/thermal ] && \
            cp /tmp/ragnarok-kernel/drivers/thermal/*.c drivers/thermal/ 2>/dev/null || echo "[!] thermal not found"
          
          echo "[+] Optimizations copied"

      - name: Configure kernel for C2S
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Use Artisan's defconfig
          if [ -f arch/arm64/configs/c2s.config ]; then
            cp arch/arm64/configs/c2s.config .config
            echo "[+] Using c2s.config"
          elif [ -f arch/arm64/configs/c2slte.config ]; then
            cp arch/arm64/configs/c2slte.config .config
            echo "[+] Using c2slte.config"
          else
            echo "[-] No C2S config found!"
            ls arch/arm64/configs/ | grep -E "(c2|exynos)" || echo "Available configs:"
            ls arch/arm64/configs/
            exit 1
          fi
          
          # Ensure KernelSU is disabled
          grep -q "CONFIG_KERNELSU" .config && sed -i '/CONFIG_KERNELSU/d' .config
          echo "# CONFIG_KERNELSU is not set" >> .config
          
          make oldconfig < /dev/null 2>&1 | tail -5
          echo "[+] Kernel configured for C2S"

      - name: Compile kernel
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CCACHE_DIR=$HOME/.ccache
          
          echo "[*] Compiling... ($(nproc) jobs)"
          if make -j$(nproc) Image dtbs 2>&1 | tee build.log; then
            echo "[+] ✅ Compilation successful!"
            ls -lh arch/arm64/boot/Image*
          else
            echo "[-] ❌ Compilation failed!"
            tail -50 build.log
            exit 1
          fi

      - name: Create flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          
          OUTDIR="InfinityKernel-C2S"
          mkdir -p $OUTDIR/META-INF/com/google/android
          
          if [ ! -f arch/arm64/boot/Image ]; then
            echo "[-] Image not found!"
            exit 1
          fi
          
          cp arch/arm64/boot/Image $OUTDIR/
          
          cat > $OUTDIR/META-INF/com/google/android/updater-script << 'EOF'
          ui_print("================================");
          ui_print("InfinityKernel One UI 8 Edition");
          ui_print("RAGNARØK Optimizations + Artisan");
          ui_print("================================");
          package_extract_file("Image");
          write_raw_image(package_extract_file("Image"), "boot");
          ui_print("✅ Installation complete!");
          EOF
          
          cd $OUTDIR
          zip -r9q ../InfinityKernel-One-UI-8-C2S.zip .
          
          cd ..
          ls -lh InfinityKernel-One-UI-8-C2S.zip

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: InfinityKernel-C2S
          path: InfinityKernel-One-UI-8-C2S.zip

      - name: Build Summary
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║    ✅ InfinityKernel Build Successful!        ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "📱 Device:        Samsung Galaxy Note 20 Ultra (C2S)"
          echo "📦 ROM:           Artisan 3.5.0 (One UI 8 / Android 16)"
          echo "⚡ Optimizations: RAGNARØK (Overclock + Thermal)"
          echo "🔧 Kernel Base:   Artisan (BPF-compatible)"
          echo ""
          echo "📥 Download the kernel from Actions artifacts"
          echo ""
