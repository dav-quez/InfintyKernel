name: Build InfinityKernel (Self-Healing)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Clone RAGNARØK kernel
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git kernel

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential gcc-aarch64-linux-gnu \
            libssl-dev libelf-dev bc bison flex device-tree-compiler zip

      - name: Prepare source
        run: |
          cp -r /tmp/kernel/* $GITHUB_WORKSPACE/
          cd $GITHUB_WORKSPACE
          
          # Desactivar referencias fantasma de KernelSU
          sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig 2>/dev/null || true
          sed -i 's/^obj-y += kernelsu\//# obj-y += kernelsu\//' drivers/Makefile 2>/dev/null || true
          
          # SOLUCIÓN GPU: Copiamos el archivo térmico directo para evitar usar rutas relativas rotas
          if [ -d drivers/gpu/arm/bv_r38p1 ]; then
            cp drivers/gpu/arm/exynos/frontend/gpex_thermal.c drivers/gpu/arm/bv_r38p1/ 2>/dev/null || true
            
            # Forzamos a gpex_thermal.c a incluir la cabecera de debug-snapshot para que use nuestros stubs
            sed -i '1i #include <linux/debug-snapshot.h>' drivers/gpu/arm/bv_r38p1/gpex_thermal.c
            
            # Modificamos el Makefile de la GPU para que busque el archivo a nivel local
            sed -i 's|\.\./exynos/frontend/gpex_thermal.o|gpex_thermal.o|g' drivers/gpu/arm/bv_r38p1/Makefile 2>/dev/null || true
          fi

      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          cp arch/arm64/configs/c2s.config .config
          sed -i '/CONFIG_DEBUG_SNAPSHOT/d' .config
          sed -i '/CONFIG_EXYNOS_SNAPSHOT/d' .config
          echo "# CONFIG_DEBUG_SNAPSHOT is not set" >> .config
          echo "# CONFIG_EXYNOS_SNAPSHOT is not set" >> .config
          make olddefconfig > /dev/null 2>&1 || true

          # Inicializar cabecera limpia
          cat > include/linux/debug-snapshot.h << 'ENDFILE'
          #ifndef __DEBUG_SNAPSHOT_H
          #define __DEBUG_SNAPSHOT_H
          #endif
          ENDFILE

      - name: Self-healing compile (auto-patches missing debug-snapshot symbols)
        run: |
          cd $GITHUB_WORKSPACE
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          MAX_TRIES=15
          PREV_COUNT=0

          for i in $(seq 1 $MAX_TRIES); do
            echo "=============================="
            echo "=== Compile attempt $i/$MAX_TRIES ==="
            echo "=============================="
            
            make -j$(nproc) Image dtbs 2>&1 | tee build.log | tail -n 40

            if [ -f arch/arm64/boot/Image ]; then
              echo "[+] ✅ Build succeeded on attempt $i"
              break
            fi

            # Extrae símbolos perdidos de los logs (tanto en compilación como de enlazado "undefined reference")
            NEW_SYMS=$(grep -E "undeclared|implicit declaration|takes just|undefined reference to" build.log \
              | grep -oE "([dD][bB][gG]_snapshot_[a-zA-Z0-9_]+|[eE][xX][yY][nN][oO][sS]_ss_[a-zA-Z0-9_]+|[dD][sS][sS]_[a-zA-Z0-9_]+)" \
              | sort -u)

            if [ -z "$NEW_SYMS" ]; then
              echo "[-] Build failed but no more debug-snapshot symbols found."
              echo "=== Last 80 lines of build.log ==="
              tail -80 build.log
              exit 1
            fi

            EXISTING=$(grep '^#define' include/linux/debug-snapshot.h 2>/dev/null | sed 's/#define //;s/(.*//' | sort -u)
            ALL_SYMS=$(printf "%s\n%s\n" "$EXISTING" "$NEW_SYMS" | sort -u | sed '/^$/d')

            CURRENT_COUNT=$(echo "$ALL_SYMS" | wc -l)
            if [ "$CURRENT_COUNT" -eq "$PREV_COUNT" ]; then
              echo "[-] No progress made (same symbols repeating), stopping."
              echo "=== Last 80 lines of build.log ==="
              tail -80 build.log
              exit 1
            fi
            PREV_COUNT=$CURRENT_COUNT

            # Reconstruir debug-snapshot.h dinámicamente
            {
              echo "#ifndef __DEBUG_SNAPSHOT_H"
              echo "#define __DEBUG_SNAPSHOT_H"
              for sym in $ALL_SYMS; do
                if expr "$sym" : '^[A-Z0-9_]*$' >/dev/null; then
                  echo "#define $sym 0"
                else
                  echo "#define $sym(...) (0)"
                fi
              done
              echo "#endif"
            } > include/linux/debug-snapshot.h

            echo "[*] Patched symbols so far:"
            echo "$ALL_SYMS"
          done

          if [ ! -f arch/arm64/boot/Image ]; then
            echo "[-] Failed after $MAX_TRIES attempts"
            exit 1
          fi

          ls -lh arch/arm64/boot/Image

      - name: Create flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p out/META-INF/com/google/android
          cp arch/arm64/boot/Image out/
          cat > out/META-INF/com/google/android/updater-script << 'EOF'
          ui_print("InfinityKernel One UI 8 - C2S");
          write_raw_image(package_extract_file("Image"), "boot");
          ui_print("Done!");
          EOF
          cd out && zip -r9 ../InfinityKernel-C2S.zip . && cd ..
          ls -lh InfinityKernel-C2S.zip

      - name: Upload debug-snapshot header (for reference)
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshot-header
          path: include/linux/debug-snapshot.h

      - uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: InfinityKernel-C2S.zip
