name: Build InfinityKernel One UI 8 (C2S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout InfinityKernel
        uses: actions/checkout@v4

      - name: Clone RAGNARØK kernel
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/dav-quez/CyberInfintyKernel.git ragnarok-kernel
          echo "[+] RAGNARØK cloned"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libarchive-tools ccache wget git \
            gcc-aarch64-linux-gnu device-tree-compiler \
            libssl-dev libelf-dev bc bison flex openssl

      - name: Prepare source
        run: |
          cd $GITHUB_WORKSPACE
          cp -r /tmp/ragnarok-kernel/* .
          echo "[+] Using RAGNARØK base"

      - name: Fix KernelSU
        run: |
          cd $GITHUB_WORKSPACE
          [ -f drivers/Kconfig ] && sed -i 's/^source "drivers\/kernelsu\/Kconfig"/#source "drivers\/kernelsu\/Kconfig"/' drivers/Kconfig
          [ -f drivers/Makefile ] && sed -i 's/^obj-y += kernelsu\//# obj-y += kernelsu\//' drivers/Makefile
          echo "[+] KernelSU disabled"

      - name: Configure kernel for C2S
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "[+] Using c2s.config"
          cp arch/arm64/configs/c2s.config .config
          
          # Make olddefconfig - auto-assigns defaults without interactive prompts
          make olddefconfig > /dev/null 2>&1 || true
          
          echo "[+] Kernel configured for C2S"

      - name: Compile kernel
        run: |
          cd $GITHUB_WORKSPACE
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "[*] Compiling kernel..."
          
          if make -j$(nproc) Image dtbs 2>&1 | tee build.log; then
            if [ -f arch/arm64/boot/Image ]; then
              echo "[+] ✅ Compilation successful!"
              ls -lh arch/arm64/boot/Image
            else
              echo "[-] Image not generated"
              tail -50 build.log
              exit 1
            fi
          else
            echo "[-] Build failed"
            grep "error:" build.log | head -20
            exit 1
          fi

      - name: Create flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          
          if [ ! -f arch/arm64/boot/Image ]; then
            echo "[-] Image not found"
            exit 1
          fi
          
          OUTDIR="InfinityKernel-C2S"
          mkdir -p $OUTDIR/META-INF/com/google/android
          cp arch/arm64/boot/Image $OUTDIR/
          
          cat > $OUTDIR/META-INF/com/google/android/updater-script << 'EOF'
          ui_print("InfinityKernel One UI 8 - C2S");
          write_raw_image(package_extract_file("Image"), "boot");
          ui_print("✅ Installation complete!");
          EOF
          
          cd $OUTDIR && zip -r9q ../InfinityKernel-One-UI-8-C2S.zip . && cd ..
          ls -lh InfinityKernel-One-UI-8-C2S.zip

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: InfinityKernel-C2S
          path: InfinityKernel-One-UI-8-C2S.zip

      - name: Success
        run: |
          echo "✅ Build completed successfully!"
